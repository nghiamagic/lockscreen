<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockscreen Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #resultImage {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            display: none; /* Sẽ hiện khi vẽ xong */
        }
        #loading {
            position: fixed;
            color: #ffffff;
            font-size: 18px;
            text-align: center;
        }
        canvas {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="loading">Đang khởi tạo engine hình nền...</div>
    
    <img id="resultImage" alt="Lockscreen Result" />
    
    <canvas id="mainCanvas"></canvas>

    <script src="script.js?v=9999"></script>
</body>
</html>
