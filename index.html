<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockscreen Prediction Engine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #resultImage {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            display: block;
        }
        canvas {
            display: none; /* Ẩn canvas, chỉ dùng để xử lý ngầm */
        }
        #loading {
            position: fixed;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="loading">Đang khởi tạo engine hình nền...</div>
    <img id="resultImage" alt="Lockscreen Result" style="display: none;" />
    <canvas id="mainCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
