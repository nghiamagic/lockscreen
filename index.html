<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockscreen Prediction Engine</title>
    <!-- Nhúng Font chữ viết tay hỗ trợ Tiếng Việt chuẩn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #resultImage {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            display: none;
        }
        #loading {
            position: fixed;
            color: #ffffff;
            font-size: 16px;
        }
        canvas {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="loading">Đang khởi tạo font viết tay và hình nền...</div>
    <img id="resultImage" alt="Lockscreen Result" />
    <canvas id="mainCanvas"></canvas>

    <script src="script.js?v=brush_art_v1"></script>
</body>
</html>
